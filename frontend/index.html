<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Oracle 2026 — Pronostics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/style.css?v=3.0" />
    <script>
        // Applique le thème avant le rendu (évite le flash) : un paramètre
        // d'URL ?theme=light|dark prime, sinon le choix mémorisé, sinon le système.
        (function () {
            const param = new URLSearchParams(location.search).get('theme');
            const t = (param === 'light' || param === 'dark') ? param : localStorage.getItem('theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <div class="layout">
        <!-- ====================== EN-TÊTE ====================== -->
        <header class="card topbar">
            <div class="brand">
                <h1>Oracle 2026</h1>
                <p class="brand__sub">Pronostics · Coupe du Monde</p>
            </div>
            <div class="topbar__right">
                <div class="clock">
                    <span class="clock__label">Serveur GMT+4</span>
                    <span class="clock__time" id="serverClock">--:--</span>
                </div>
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="Basculer le thème">🌙</button>
            </div>
        </header>

        <!-- ====================== KPIs ====================== -->
        <section class="kpi-grid" aria-label="Indicateurs clés">
            <article class="card kpi">
                <span class="kpi__value">3 / 3</span>
                <span class="kpi__label">Daemons actifs</span>
            </article>
            <article class="card kpi">
                <span class="kpi__value">—</span>
                <span class="kpi__label">Évènements collectés</span>
            </article>
            <article class="card kpi">
                <span class="kpi__value">—</span>
                <span class="kpi__label">Confiance moyenne</span>
            </article>
            <article class="card kpi kpi--alert">
                <span class="kpi__value">—</span>
                <span class="kpi__label">Pronostics périmés</span>
            </article>
        </section>

        <!-- ====================== MATCHS ====================== -->
        <section class="matches" aria-label="Matchs">
            <div class="section-head">
                <h2 id="titreSection">Matchs</h2>
                <nav class="tabs" role="tablist" aria-label="Vues du calendrier">
                    <button class="tab tab--actif" data-filtre="jour" role="tab">Aujourd'hui</button>
                    <button class="tab" data-filtre="historique" role="tab">Historique</button>
                    <button class="tab" data-filtre="calendrier" role="tab">Calendrier</button>
                </nav>
                <span class="pill">…</span>
            </div>

            <article class="card match">
                <div class="match__meta">Connexion au pipeline…</div>
            </article>
        </section>

        <footer class="footer">
            Oracle 2026 · pipeline supervisé par Nagios/NRPE · données indicatives
        </footer>
    </div>

    <script>
        // Horloge serveur (GMT+4), purement décorative.
        function tick() {
            const now = new Date();
            const gmt4 = new Date(now.getTime() + (now.getTimezoneOffset() + 240) * 60000);
            const hh = String(gmt4.getHours()).padStart(2, '0');
            const mm = String(gmt4.getMinutes()).padStart(2, '0');
            document.getElementById('serverClock').textContent = `${hh}:${mm}`;
        }
        tick();
        setInterval(tick, 1000);

        // Bascule de thème (clair / sombre), mémorisée.
        const toggle = document.getElementById('themeToggle');
        function themeActuel() {
            return document.documentElement.getAttribute('data-theme')
                || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }
        function majIconeTheme() {
            toggle.textContent = themeActuel() === 'dark' ? '☀️' : '🌙';
        }
        toggle.addEventListener('click', () => {
            const suivant = themeActuel() === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', suivant);
            localStorage.setItem('theme', suivant);
            majIconeTheme();
        });
        majIconeTheme();
    </script>

    <script>
        // ==================================================================
        // Connexion au backend (serveur_api.py — FastAPI, même origine).
        // URLs relatives : indispensable pour l'accès distant via tunnel.
        // ==================================================================
        const API_URL = '/api/matchs_du_jour';
        const KPI_URL = '/api/kpis';

        const DRAPEAUX = {
            'France': '🇫🇷', 'Brésil': '🇧🇷', 'Argentine': '🇦🇷', 'Canada': '🇨🇦',
            'Mexique': '🇲🇽', 'États-Unis': '🇺🇸', 'Angleterre': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Espagne': '🇪🇸',
            'Allemagne': '🇩🇪', 'Portugal': '🇵🇹', 'Pays-Bas': '🇳🇱', 'Belgique': '🇧🇪',
            'Croatie': '🇭🇷', 'Maroc': '🇲🇦', 'Sénégal': '🇸🇳', 'Japon': '🇯🇵',
            'Uruguay': '🇺🇾', 'Colombie': '🇨🇴', 'Équateur': '🇪🇨',
            'Afrique du Sud': '🇿🇦', 'Corée du Sud': '🇰🇷', 'Tchéquie': '🇨🇿',
            'Autriche': '🇦🇹', 'Nigéria': '🇳🇬', 'Guatemala': '🇬🇹',
            'Qatar': '🇶🇦', 'Suisse': '🇨🇭', 'Haïti': '🇭🇹', 'Écosse': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
            'Australie': '🇦🇺', 'Turquie': '🇹🇷', 'Curaçao': '🇨🇼', 'Suède': '🇸🇪',
            "Côte d'Ivoire": '🇨🇮', 'Norvège': '🇳🇴', 'Italie': '🇮🇹', 'Danemark': '🇩🇰',
            'Pologne': '🇵🇱', 'Arabie saoudite': '🇸🇦', 'Iran': '🇮🇷', 'Ghana': '🇬🇭',
            'Cameroun': '🇨🇲', 'Égypte': '🇪🇬', 'Tunisie': '🇹🇳', 'Pérou': '🇵🇪',
            'Chili': '🇨🇱', 'Panama': '🇵🇦', 'Costa Rica': '🇨🇷', 'Paraguay': '🇵🇾',
            'Nouvelle-Zélande': '🇳🇿', 'Jordanie': '🇯🇴', 'Ouzbékistan': '🇺🇿',
            'Cap-Vert': '🇨🇻', 'Algérie': '🇩🇿', 'Bosnie-Herzégovine': '🇧🇦',
        };

        // Échappement HTML : noms et descriptions issus du scraping.
        function esc(s) {
            const div = document.createElement('div');
            div.textContent = s ?? '';
            return div.innerHTML;
        }

        function classeRisque(indice) {
            return indice < 34 ? 'low' : indice < 67 ? 'mid' : 'high';
        }

        function heureServeur(iso) {
            return new Intl.DateTimeFormat('fr-FR', {
                hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Dubai',
            }).format(new Date(iso));
        }

        function dateHeureServeur(iso) {
            return new Intl.DateTimeFormat('fr-FR', {
                day: 'numeric', month: 'short',
                hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Dubai',
            }).format(new Date(iso));
        }

        // Verdict a posteriori : le pronostic 1/N/2 était-il le bon ?
        function verdictPronostic(m) {
            if (m.statut !== 'TERMINE' || !m.issue
                || m.score_dom == null || m.score_ext == null) return '';
            const reel = m.score_dom > m.score_ext ? '1'
                       : m.score_dom < m.score_ext ? '2' : 'N';
            const ok = reel === m.issue;
            return `<span class="verdict ${ok ? 'verdict--ok' : 'verdict--ko'}">
                ${ok ? 'Pronostic ✓' : 'Pronostic ✗'}</span>`;
        }

        // Issue 1/N/2 -> texte explicite.
        function libelleIssue(m) {
            if (m.issue === '1') return `Victoire ${m.equipe_dom}`;
            if (m.issue === '2') return `Victoire ${m.equipe_ext}`;
            return 'Match nul';
        }

        function blocPronostic(m) {
            if (!m.issue) {
                return `<div class="prono">
                    <span class="prono__tag">Pronostic</span>
                    <span class="prono__pick">—</span>
                    <span class="prono__state">En attente</span>
                </div>`;
            }
            const obsolete = m.statut_pronostic === 'OBSOLETE';
            const badgeSignal = m.signal
                ? `<span class="signal signal--${m.signal.niveau}">${esc(m.signal.libelle)}</span>`
                : verdictPronostic(m);
            const etat = obsolete
                ? '<span class="prono__state">Obsolète</span>'
                : `<span class="prono__state prono__state--ok">Valide · ${Number(m.confiance).toFixed(2)}</span>`;
            const pick = esc(libelleIssue(m)) +
                (m.score_estime ? ` (${esc(m.score_estime)})` : '');
            const pourquoi = m.justification
                ? `<p class="prono__why">${esc(m.justification)}</p>`
                : '';
            return `<div class="prono${obsolete ? ' prono--obsolete' : ''}">
                <span class="prono__tag">Pronostic</span>
                <span class="prono__pick">${pick}</span>
                ${etat}
                ${badgeSignal}
            </div>
            ${pourquoi}`;
        }

        function enteteEquipes(m, centre) {
            return `<div class="match__teams">
                <div class="team">
                    <span class="team__flag">${DRAPEAUX[m.equipe_dom] ?? '⚽'}</span>
                    <span class="team__name">${esc(m.equipe_dom)}</span>
                </div>
                <span class="match__vs">${centre}</span>
                <div class="team team--right">
                    <span class="team__name">${esc(m.equipe_ext)}</span>
                    <span class="team__flag">${DRAPEAUX[m.equipe_ext] ?? '⚽'}</span>
                </div>
            </div>`;
        }

        function carteMatch(m) {
            // Slot du calendrier : carte minimale, atténuée.
            if (m.statut === 'EN_ATTENTE') {
                const meta = [m.phase, 'En attente des qualifications'].map(esc).join(' · ');
                return `<article class="card match match--attente">
                    ${enteteEquipes(m, dateHeureServeur(m.coup_envoi))}
                    <div class="match__meta">${meta}</div>
                </article>`;
            }

            const indice = Math.round(Number(m.indice_risque));
            const niveau = classeRisque(indice);
            const enCours = m.statut === 'EN_COURS';
            const termine = m.statut === 'TERMINE';

            let centre;
            if (termine) {
                centre = `<span class="score-final">${m.score_dom ?? '?'} – ${m.score_ext ?? '?'}</span>`;
            } else if (enCours) {
                centre = `LIVE ${m.score_dom ?? 0}–${m.score_ext ?? 0}`;
            } else {
                centre = heureServeur(m.coup_envoi);
            }

            const meta = [termine ? dateHeureServeur(m.coup_envoi) : null,
                          m.stade, m.ville, m.phase].filter(Boolean).map(esc).join(' · ');
            const raison = m.dernier_evenement
                ? esc(m.dernier_evenement.slice(0, 110))
                : 'Contexte stable · aucun évènement détecté';

            return `<article class="card match${termine ? ' match--termine' : ''}">
                ${enteteEquipes(m, centre)}
                <div class="match__meta">${meta}</div>
                <div class="risk">
                    <div class="risk__head">
                        <span>Indice de risque</span>
                        <span class="risk__num risk__num--${niveau}">${indice}</span>
                    </div>
                    <div class="risk__bar">
                        <span class="risk__fill risk__fill--${niveau}" style="--risk: ${indice}%;"></span>
                    </div>
                    <p class="risk__reason">${raison}</p>
                </div>
                ${blocPronostic(m)}
            </article>`;
        }

        const ONGLETS = {
            jour:       { titre: 'Matchs du moment' },
            historique: { titre: 'Historique des matchs joués' },
            calendrier: { titre: 'Calendrier complet 2026' },
        };

        async function chargerMatchs(filtre = 'jour') {
            let data;
            try {
                const reponse = await fetch(`${API_URL}?filtre=${filtre}`);
                if (!reponse.ok) throw new Error(`HTTP ${reponse.status}`);
                data = await reponse.json();
            } catch (err) {
                console.warn('API Oracle 2026 injoignable :', err);
                return;
            }

            const section = document.querySelector('.matches');
            section.querySelectorAll('.match').forEach(el => el.remove());

            document.getElementById('titreSection').textContent = ONGLETS[filtre].titre;
            const pill = section.querySelector('.pill');
            if (pill) {
                if (filtre === 'jour') {
                    pill.textContent = new Intl.DateTimeFormat('fr-FR', {
                        day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Asia/Dubai',
                    }).format(new Date());
                } else if (filtre === 'historique') {
                    pill.textContent = `${data.matchs.length} match(s) joué(s)`;
                } else {
                    pill.textContent = `${data.matchs.length} matchs programmés`;
                }
            }

            if (!data.matchs.length) {
                section.insertAdjacentHTML('beforeend',
                    '<article class="card match"><div class="match__meta">Aucun match dans cette vue pour le moment.</div></article>');
                return;
            }
            for (const m of data.matchs) {
                section.insertAdjacentHTML('beforeend', carteMatch(m));
            }
        }

        document.querySelectorAll('.tab').forEach(bouton => {
            bouton.addEventListener('click', () => {
                document.querySelector('.tab--actif')?.classList.remove('tab--actif');
                bouton.classList.add('tab--actif');
                chargerMatchs(bouton.dataset.filtre);
            });
        });

        async function chargerKpis() {
            let kpis;
            try {
                const reponse = await fetch(KPI_URL);
                if (!reponse.ok) throw new Error(`HTTP ${reponse.status}`);
                kpis = await reponse.json();
            } catch (err) {
                console.warn('KPIs indisponibles :', err);
                return;
            }
            const valeurs = document.querySelectorAll('.kpi-grid .kpi .kpi__value');
            if (valeurs.length < 4) return;
            valeurs[0].textContent = kpis.daemons_actifs;
            valeurs[1].textContent = kpis.evenements_nuit;
            valeurs[2].textContent = kpis.confiance_moyenne != null
                ? `${Math.round(Number(kpis.confiance_moyenne))}%` : '—';
            valeurs[3].textContent = kpis.pronostics_perimes;
        }

        chargerMatchs();
        chargerKpis();
    </script>
</body>
</html>
