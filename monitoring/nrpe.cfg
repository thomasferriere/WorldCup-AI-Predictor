###############################################################################
# nrpe.cfg — Oracle 2026 (côté HÔTE SURVEILLÉ : machine macOS scrapers + PostgreSQL)
#
# Emplacement cible : /usr/local/etc/nrpe.cfg   (brew)
#                  ou /etc/nagios/nrpe.cfg      (Linux)
#
# Rôle : autoriser le serveur Nagios à exécuter à distance les checks locaux
# (plugins maison dans /usr/local/oracle2026/plugins, cf. docs/MONITORING.md §3).
#
# Après modification :  brew services restart nrpe
# Test depuis le serveur Nagios :
#   check_nrpe -H 192.168.1.20 -c check_proc_daemon
###############################################################################

# ------------------------- Réseau & sécurité --------------------------------

# Port d'écoute standard NRPE
server_port=5666

# Seuls le loopback et le serveur Nagios (192.168.1.10) peuvent interroger
# cet agent. Toute autre IP est rejetée — NE PAS élargir à tout le LAN.
allowed_hosts=127.0.0.1,192.168.1.10

# Autorise le passage d'arguments par check_nrpe (requis par check_nrpe_args).
# ⚠ Surface d'attaque accrue : ne l'activer que parce que allowed_hosts est
# strictement limité, et ne jamais combiner avec des plugins qui passent les
# arguments à un shell sans validation.
dont_blame_nrpe=1

# L'agent ne tourne jamais en root
nrpe_user=nagios
nrpe_group=nagios

# Journalisation des requêtes (debug=1 seulement pour diagnostiquer)
debug=0
log_facility=daemon

# Délai max d'exécution d'un plugin (les checks SQL doivent rester courts)
command_timeout=30
connection_timeout=300

# ------------------------- Commandes exposées -------------------------------
# Chaque command[...] est le SEUL code exécutable à distance : Nagios ne peut
# appeler que ce qui est explicitement déclaré ici.

# --- LE check vital : des données fraîches arrivent-elles vraiment en base ?
# (warn 30 min, crit 60 min ; tolérant hors fenêtre nocturne 01h-09h GMT+4)
command[check_freshness]=/usr/local/oracle2026/plugins/check_scraper_freshness.sh 30 60

# --- État du daemon d'ingestion unifié (ingestion/scraper_daemon.py)
# OK au repos (lancé par cron), CRITICAL si les exécutions s'empilent (blocage)
command[check_proc_daemon]=/usr/local/oracle2026/plugins/check_scraper_proc.sh scraper_daemon.py

# --- État des trois daemons spécialisés (cibles de la phase suivante)
command[check_proc_news]=/usr/local/oracle2026/plugins/check_scraper_proc.sh scraper_news.py
command[check_proc_lineups]=/usr/local/oracle2026/plugins/check_scraper_proc.sh scraper_lineups.py
command[check_proc_odds]=/usr/local/oracle2026/plugins/check_scraper_proc.sh scraper_odds.py

# --- PostgreSQL joignable + temps de réponse (warn 2 s, crit 5 s)
command[check_pg]=/usr/local/opt/monitoring-plugins/sbin/check_pgsql -H 127.0.0.1 -d oracle2026 -l nagios -w 2 -c 5

# --- Place disque pour les logs de scraping (warn 20 %, crit 10 % libres)
command[check_disk_logs]=/usr/local/opt/monitoring-plugins/sbin/check_disk -w 20% -c 10% -p /usr/local/oracle2026/logs

# --- Checks système génériques (charge et nombre total de processus)
command[check_load]=/usr/local/opt/monitoring-plugins/sbin/check_load -w 5,4,3 -c 10,8,6
command[check_total_procs]=/usr/local/opt/monitoring-plugins/sbin/check_procs -w 250 -c 400
