###############################################################################
# commands.cfg — Oracle 2026 (côté SERVEUR Nagios Core)
#
# Emplacement cible : /usr/local/etc/nagios/objects/commands.cfg
# (ou inclusion via cfg_file=.../oracle_commands.cfg dans nagios.cfg)
#
# Rôle : définir COMMENT Nagios interroge l'hôte des scrapers.
# Tous les checks métier (fraîcheur des données, état des daemons, PostgreSQL,
# disque des logs) sont exécutés LOCALEMENT sur l'hôte surveillé par l'agent
# NRPE — voir monitoring/nrpe.cfg. Côté Nagios, on ne définit donc qu'un
# appel distant générique : check_nrpe.
#
# Validation après modification :
#   nagios -v /usr/local/etc/nagios/nagios.cfg
###############################################################################

# -----------------------------------------------------------------------------
# Appel distant générique vers l'agent NRPE (TCP 5666).
# $ARG1$ = nom de la commande déclarée dans nrpe.cfg, ex. check_freshness.
# Usage dans un service :  check_command  check_nrpe!check_freshness
# -----------------------------------------------------------------------------
define command {
    command_name    check_nrpe
    command_line    $USER1$/check_nrpe -H $HOSTADDRESS$ -c $ARG1$
}

# -----------------------------------------------------------------------------
# Variante avec arguments passés au plugin distant.
# Nécessite dont_blame_nrpe=1 dans nrpe.cfg (voir avertissement là-bas).
# Usage :  check_command  check_nrpe_args!check_freshness!15 45
# -----------------------------------------------------------------------------
define command {
    command_name    check_nrpe_args
    command_line    $USER1$/check_nrpe -H $HOSTADDRESS$ -c $ARG1$ -a $ARG2$
}

###############################################################################
# Rappel de la correspondance services -> commandes NRPE
# (les définitions de services vivent dans oracle_services.cfg, cf. docs/MONITORING.md §5.4)
#
#   Service Nagios                check_command                    Check NRPE distant
#   ---------------------------   ------------------------------   ----------------------
#   Fraicheur-Donnees-Scraping    check_nrpe!check_freshness       check_scraper_freshness.sh 30 60
#   Daemon-Ingestion              check_nrpe!check_proc_daemon     check_scraper_proc.sh scraper_daemon.py
#   Daemon-News                   check_nrpe!check_proc_news       check_scraper_proc.sh scraper_news.py
#   Daemon-Compositions           check_nrpe!check_proc_lineups    check_scraper_proc.sh scraper_lineups.py
#   Daemon-Cotes                  check_nrpe!check_proc_odds       check_scraper_proc.sh scraper_odds.py
#   PostgreSQL-Oracle2026         check_nrpe!check_pg              check_pgsql -d oracle2026
#   Disque-Logs                   check_nrpe!check_disk_logs       check_disk -w 20% -c 10%
###############################################################################

# -----------------------------------------------------------------------------
# Commandes de notification référencées par contacts.cfg (admin_oracle).
# Reprises de la conf Nagios standard ; à omettre si déjà définies ailleurs.
# -----------------------------------------------------------------------------
define command {
    command_name    notify-service-by-email
    command_line    /usr/bin/printf "%b" "***** Nagios Oracle 2026 *****\n\nNotification : $NOTIFICATIONTYPE$\nService : $SERVICEDESC$\nHote : $HOSTALIAS$\nAdresse : $HOSTADDRESS$\nEtat : $SERVICESTATE$\nDate (serveur GMT+4) : $LONGDATETIME$\n\nDetail :\n$SERVICEOUTPUT$\n" | /usr/bin/mail -s "** $NOTIFICATIONTYPE$ : $HOSTALIAS$/$SERVICEDESC$ est $SERVICESTATE$ **" $CONTACTEMAIL$
}

define command {
    command_name    notify-host-by-email
    command_line    /usr/bin/printf "%b" "***** Nagios Oracle 2026 *****\n\nNotification : $NOTIFICATIONTYPE$\nHote : $HOSTNAME$\nEtat : $HOSTSTATE$\nAdresse : $HOSTADDRESS$\nDate (serveur GMT+4) : $LONGDATETIME$\n\nDetail :\n$HOSTOUTPUT$\n" | /usr/bin/mail -s "** $NOTIFICATIONTYPE$ : hote $HOSTNAME$ est $HOSTSTATE$ **" $CONTACTEMAIL$
}
